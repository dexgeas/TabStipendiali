<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabelle Stipendiali – Comparto Scuola</title>
<style>
  :root {
    --blue-dark: #1a3a5c;
    --blue-mid: #2563a8;
    --blue-light: #dbeafe;
    --grey-bg: #f5f7fa;
    --grey-border: #d1d5db;
    --text: #1e293b;
    --text-light: #64748b;
    --white: #ffffff;
    --green: #16a34a;
    --accent: #e8f0fe;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--grey-bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--blue-dark);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: .01em; }
  header span { font-size: .85rem; opacity: .7; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  .card {
    background: var(--white);
    border: 1px solid var(--grey-border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }

  .card h2 {
    font-size: .85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-light);
    margin-bottom: 16px;
  }

  .inputs {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: .8rem; font-weight: 600; color: var(--text-light); }

  select, input[type="date"], input[type="number"] {
    height: 38px;
    padding: 0 10px;
    border: 1px solid var(--grey-border);
    border-radius: 6px;
    font-size: .9rem;
    background: var(--white);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  select:focus, input:focus { border-color: var(--blue-mid); }

  #qualifica-select { min-width: 340px; }
  #ore-input { width: 80px; }

  button#cerca {
    height: 38px;
    padding: 0 20px;
    background: var(--blue-mid);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  button#cerca:hover { background: var(--blue-dark); }

  .ore-note { font-size: .75rem; color: var(--text-light); margin-top: 2px; }

  /* Result header */
  .result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 16px;
    font-size: .85rem;
  }
  .result-meta .chip {
    background: var(--accent);
    border: 1px solid #c7d7f9;
    border-radius: 20px;
    padding: 4px 12px;
    font-weight: 600;
    color: var(--blue-mid);
  }
  .result-meta .chip span { font-weight: 400; color: var(--text); }

  /* Table */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .82rem;
  }

  thead tr.header-group th {
    background: var(--blue-dark);
    color: white;
    padding: 8px 10px;
    text-align: center;
    font-weight: 600;
    font-size: .78rem;
    letter-spacing: .03em;
    border: 1px solid #2d5080;
  }

  thead tr.header-sub th {
    background: var(--blue-mid);
    color: white;
    padding: 6px 10px;
    text-align: right;
    font-weight: 500;
    font-size: .75rem;
    border: 1px solid #3a6fc0;
    white-space: nowrap;
  }
  thead tr.header-sub th:first-child { text-align: left; }

  tbody tr { border-bottom: 1px solid #e8ecf0; }
  tbody tr:hover { background: #f0f5ff; }
  tbody tr:nth-child(even) { background: #f8fafc; }
  tbody tr:nth-child(even):hover { background: #e8f0fe; }

  td {
    padding: 8px 10px;
    text-align: right;
    border-right: 1px solid #e8ecf0;
    white-space: nowrap;
  }
  td:first-child { text-align: left; font-weight: 600; color: var(--blue-dark); }
  td.voce-flag {
    text-align: center;
    font-size: .7rem;
    color: var(--text-light);
  }
  td.total {
    font-weight: 700;
    background: var(--blue-light) !important;
    color: var(--blue-dark);
  }
  td.zero { color: #ccc; }

  .flags-row td {
    font-size: .72rem;
    color: var(--text-light);
    padding: 4px 10px;
    background: #f8fafc;
    text-align: center;
    border-right: 1px solid #e8ecf0;
  }
  .flags-row td:first-child { text-align: left; color: var(--text-light); }

  .tag-si { color: var(--green); font-weight: 600; }
  .tag-no { color: #aaa; }

  /* Toggle monthly/annual */
  .toggle-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    font-size: .85rem;
  }
  .toggle-bar label { font-weight: 600; color: var(--text-light); }
  .toggle-btn {
    padding: 4px 12px;
    border: 1px solid var(--grey-border);
    border-radius: 4px;
    background: var(--white);
    font-size: .8rem;
    cursor: pointer;
    color: var(--text-light);
    transition: all .15s;
  }
  .toggle-btn.active {
    background: var(--blue-mid);
    color: white;
    border-color: var(--blue-mid);
  }

  #empty-msg {
    text-align: center;
    padding: 40px;
    color: var(--text-light);
    font-size: .95rem;
  }
  #error-msg {
    background: #fee2e2;
    border: 1px solid #fca5a5;
    border-radius: 6px;
    padding: 12px 16px;
    color: #991b1b;
    font-size: .88rem;
    margin-bottom: 16px;
    display: none;
  }

  .pro-rata-note {
    font-size: .78rem;
    color: var(--blue-mid);
    font-style: italic;
    margin-top: 8px;
  }

  footer {
    text-align: center;
    font-size: .75rem;
    color: var(--text-light);
    padding: 20px;
    border-top: 1px solid var(--grey-border);
    margin-top: 10px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Tabelle Stipendiali – Comparto Scuola</h1>
    <span>CCNL 01/05/1990 → CCNL 2019-2021 (Comparto Istruzione e Ricerca)</span>
  </div>
</header>

<div class="container">

  <div class="card">
    <h2>Parametri di ricerca</h2>
    <div class="inputs">
      <div class="field">
        <label for="qualifica-select">Qualifica</label>
        <select id="qualifica-select">
          <option value="">— Seleziona —</option>
        </select>
      </div>
      <div class="field">
        <label for="data-input">Data di riferimento</label>
        <input type="date" id="data-input" value="">
      </div>
      <div class="field">
        <label for="ore-input">Ore settimanali</label>
        <input type="number" id="ore-input" min="1" max="36" value="">
        <div class="ore-note" id="ore-note"></div>
      </div>
      <div class="field">
        <button id="cerca">Cerca</button>
      </div>
    </div>
  </div>

  <div id="error-msg"></div>

  <div class="card" id="result-card" style="display:none">
    <div class="result-meta" id="result-meta"></div>

    <div class="toggle-bar">
      <label>Importi:</label>
      <button class="toggle-btn active" id="btn-mensile" onclick="setMode('mensile')">Mensili</button>
      <button class="toggle-btn" id="btn-annuale" onclick="setMode('annuale')">Annuali (×12)</button>
    </div>

    <div id="error-msg-inner"></div>
    <div class="table-wrap" id="table-wrap"></div>
    <div class="pro-rata-note" id="pro-rata-note" style="display:none"></div>
  </div>

</div>

<footer>
  Fonte: CCNL Comparto Scuola / Istruzione e Ricerca – Elaborazione da dati INPS (Stanizzi 2022-2024)
</footer>

<script>
let DATA = null;
let currentMode = 'mensile';
let lastResult = null;

// Load data
fetch('data.json')
  .then(r => r.json())
  .then(d => {
    DATA = d;
    initUI();
  })
  .catch(() => showError('Impossibile caricare data.json. Assicurarsi che il file sia nella stessa cartella di index.html.'));

function initUI() {
  const sel = document.getElementById('qualifica-select');
  DATA.qualifiche.forEach(q => {
    const opt = document.createElement('option');
    opt.value = q.id;
    opt.textContent = q.nome;
    sel.appendChild(opt);
  });

  // Default date = today
  document.getElementById('data-input').value = new Date().toISOString().slice(0,10);

  sel.addEventListener('change', updateOreDefault);
  document.getElementById('cerca').addEventListener('click', search);
  document.getElementById('data-input').addEventListener('keydown', e => { if (e.key==='Enter') search(); });
}

function updateOreDefault() {
  const q = DATA.qualifiche.find(x => x.id === document.getElementById('qualifica-select').value);
  if (q) {
    document.getElementById('ore-input').value = q.ore_max;
    document.getElementById('ore-input').max = q.ore_max;
    document.getElementById('ore-note').textContent = `Max: ${q.ore_max} ore`;
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-mensile').classList.toggle('active', mode==='mensile');
  document.getElementById('btn-annuale').classList.toggle('active', mode==='annuale');
  if (lastResult) renderTable(lastResult);
}

function search() {
  hideError();
  const qId = document.getElementById('qualifica-select').value;
  const dataStr = document.getElementById('data-input').value;
  const oreVal = parseInt(document.getElementById('ore-input').value, 10);

  if (!qId) { showError('Seleziona una qualifica.'); return; }
  if (!dataStr) { showError('Inserisci una data di riferimento.'); return; }

  const q = DATA.qualifiche.find(x => x.id === qId);
  const oreMax = q.ore_max;
  const ore = (oreVal > 0 && oreVal <= oreMax) ? oreVal : oreMax;
  const dataRef = dataStr; // 'YYYY-MM-DD'

  // Filter records for this qualifica and date
  const filtered = DATA.records.filter(r =>
    r.q === qId &&
    r.dal <= dataRef &&
    (r.al >= dataRef || !r.al)
  );

  if (filtered.length === 0) {
    showError(`Nessun dato trovato per "${q.nome}" alla data ${formatDate(dataRef)}. Verificare che la data sia compresa nel periodo coperto dai dati (dal 01/05/1990).`);
    document.getElementById('result-card').style.display = 'none';
    return;
  }

  // Get period info
  const dalPeriodo = filtered[0].dal;
  const alPeriodo = filtered[0].al;

  // Group by fascia → voce → importo
  const byFascia = {};
  filtered.forEach(r => {
    if (!byFascia[r.f]) byFascia[r.f] = { desc: r.fd, voci: {} };
    byFascia[r.f].voci[r.v] = { imp: r.imp, nome: r.vn, fissa: r.fissa, mag18: r.mag18 };
  });

  // Compute 13^ where 'h' is missing: sum(voci fisse) / 12
  Object.values(byFascia).forEach(fd => {
    if (!fd.voci['h']) {
      const sumFisse = Object.values(fd.voci)
        .filter(v => v.fissa)
        .reduce((s, v) => s + v.imp, 0);
      if (sumFisse > 0) {
        fd.voci['h'] = { imp: sumFisse / 12, nome: '13ª mensilità (calcolata)', fissa: false, mag18: false, computed: true };
      }
    }
  });

  // Collect all voice codes present
  const vociSet = new Set();
  Object.values(byFascia).forEach(f => Object.keys(f.voci).forEach(v => vociSet.add(v)));
  // Sort voci in logical order
  const VOCE_ORDER = ['a','b','c','d','e','f','g','m','n','l','h','i'];
  const voci = VOCE_ORDER.filter(v => vociSet.has(v));

  lastResult = { q, ore, oreMax, dataRef, dalPeriodo, alPeriodo, byFascia, voci };
  renderTable(lastResult);
}

function formatDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}

function fmtEur(val) {
  if (!val || val === 0) return '<span class="zero">—</span>';
  return val.toLocaleString('it-IT', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
}

function renderTable({ q, ore, oreMax, dataRef, dalPeriodo, alPeriodo, byFascia, voci }) {
  const card = document.getElementById('result-card');
  card.style.display = 'block';
  const isProRata = ore < oreMax;
  const ratio = ore / oreMax;
  const divisor = currentMode === 'mensile' ? 12 : 1;

  // Meta chips
  document.getElementById('result-meta').innerHTML = `
    <div class="chip">Qualifica: <span>${q.nome}</span></div>
    <div class="chip">Data: <span>${formatDate(dataRef)}</span></div>
    <div class="chip">Periodo CCNL: <span>${formatDate(dalPeriodo)} → ${formatDate(alPeriodo)}</span></div>
    <div class="chip">Ore: <span>${ore}/${oreMax}</span></div>
  `;

  const proRataNote = document.getElementById('pro-rata-note');
  if (isProRata) {
    proRataNote.style.display = 'block';
    proRataNote.textContent = `★ Importi calcolati pro-rata: ${ore}/${oreMax} ore (×${ratio.toFixed(4)})`;
  } else {
    proRataNote.style.display = 'none';
  }

  // Voice labels (short)
  const VOCE_LABEL = {
    'a':'Tabellare','b':'Ind. funzione','c':'Vacanza contr.','d':'Art.7 L.438/92',
    'e':'IIS','f':'Pos. econ. ATA','g':'IVC','m':'IVC 2025','n':'Anticipo CCNL',
    'l':'RPD','h':'13ª mens.','i':'CIA',
  };

  // Build voice names for header (first col = Fascia)
  const fasceSorted = Object.keys(byFascia).map(Number).sort((a,b)=>a-b);

  // Collect flag info from first fascia that has each voce
  const voceFlags = {};
  Object.values(byFascia).forEach(fd => {
    Object.entries(fd.voci).forEach(([v, info]) => {
      if (!voceFlags[v]) voceFlags[v] = { fissa: info.fissa, mag18: info.mag18, nome: info.nome };
    });
  });

  let html = '<table>';

  // Header row 1: group labels
  html += '<thead><tr class="header-group">';
  html += `<th rowspan="2">Fascia retributiva</th>`;
  html += `<th colspan="${voci.length}">Emolumenti contrattuali fissi e continuativi</th>`;
  html += `<th rowspan="2" style="min-width:110px">13ª mens.</th>`;
  html += `<th rowspan="2" style="min-width:100px">CIA / RPD</th>`;
  html += `<th colspan="2" style="background:#0f2d50">Totali</th>`;
  html += '</tr>';

  // Header row 2: voice names
  html += '<tr class="header-sub">';
  html += `<th style="text-align:left">Fascia</th>`;
  // Remove h, i, l from main voci loop (handled separately)
  const vociMain = voci.filter(v => !['h','i','l'].includes(v));
  vociMain.forEach(v => {
    html += `<th>${VOCE_LABEL[v]||v}</th>`;
  });
  // Totals
  html += `<th style="background:#0f2d50">Fisse e cont.</th>`;
  html += `<th style="background:#0f2d50">Magg. 18%</th>`;
  html += '</tr>';

  // Flags sub-row
  html += '<tr class="flags-row">';
  html += '<td>Valutabile ai fini 13^:</td>';
  vociMain.forEach(v => {
    const f = voceFlags[v];
    html += `<td><span class="${f?.fissa ? 'tag-si':'tag-no'}">${f?.fissa ? 'SI':'NO'}</span></td>`;
  });
  html += '<td></td><td></td>';
  html += '<td></td><td></td>';
  html += '</tr>';
  html += '<tr class="flags-row">';
  html += '<td>Maggiorabile del 18%:</td>';
  vociMain.forEach(v => {
    const f = voceFlags[v];
    html += `<td><span class="${f?.mag18 ? 'tag-si':'tag-no'}">${f?.mag18 ? 'SI':'NO'}</span></td>`;
  });
  html += '<td></td><td></td>';
  html += '<td></td><td></td>';
  html += '</tr>';
  html += '</thead><tbody>';

  fasceSorted.forEach(fn => {
    const fd = byFascia[fn];
    html += '<tr>';
    html += `<td>${fd.desc}</td>`;

    let totalFissa = 0;
    let totalMag18 = 0;

    vociMain.forEach(v => {
      const vd = fd.voci[v];
      if (vd) {
        const val = (vd.imp / divisor) * ratio;
        html += `<td>${fmtEur(val)}</td>`;
        if (voceFlags[v]?.fissa) totalFissa += vd.imp;
        if (voceFlags[v]?.mag18) totalMag18 += vd.imp;
      } else {
        html += '<td class="zero">—</td>';
      }
    });

    // 13^ — stored as annual in old periods, as monthly/12 (=mensile) when computed
    const h = fd.voci['h'];
    if (h) {
      // If computed (sum fisse/12), value is already the monthly 13^; for mode=annuale multiply by 12
      // If stored (raw data), value is annual; divide by 12 for mensile
      const hVal = h.computed
        ? (currentMode === 'mensile' ? h.imp * ratio : h.imp * 12 * ratio)
        : (h.imp / divisor) * ratio;
      const note = h.computed ? ' <small style="color:#888;font-weight:400">(calc.)</small>' : '';
      html += `<td>${fmtEur(hVal)}${note}</td>`;
    } else {
      html += '<td class="zero">—</td>';
    }

    // CIA or RPD
    const cia = fd.voci['i'];
    const rpd = fd.voci['l'];
    const ciaRpd = cia || rpd;
    html += `<td>${ciaRpd ? fmtEur((ciaRpd.imp / divisor) * ratio) : '<span class="zero">—</span>'}</td>`;

    // Totals
    html += `<td class="total">${fmtEur((totalFissa / divisor) * ratio)}</td>`;
    html += `<td class="total">${fmtEur((totalMag18 / divisor) * ratio)}</td>`;

    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}
</script>
</body>
</html>
